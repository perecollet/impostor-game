server:
  port: 8761

spring:
  application:
    name: discovery-server

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false  # don't register myself
    fetch-registry: false        # don't fetch from others
    service-url:
      defaultZone: http://localhost:8761/eureka/  # where others register
  server:
    wait-time-in-ms-when-sync-empty: 0  # start immediately