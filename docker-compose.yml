services:
  postgres:
    image: postgres:15
    container_name: impostor-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-dbs.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: impostor-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: